<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ──────────────────────────────────────────────────── -->
    <title>Valcr Console — API Keys, Usage & Developer Dashboard</title>
    <meta name="description" content="The Valcr Console is your developer hub for managing API keys, monitoring usage, reviewing request logs, and configuring webhooks for the Valcr Commerce Intelligence API." />
    <meta name="keywords" content="Valcr, Valcr API, commerce benchmarks, ecommerce financial data, API console, developer dashboard, VCFS, benchmark intelligence" />
    <meta name="author" content="Valcr — Cyntax LLC" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />
    <link rel="canonical" href="https://console.valcr.site/" />

    <!-- ── Open Graph ────────────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://console.valcr.site/" />
    <meta property="og:title"       content="Valcr Console — Commerce Intelligence API Dashboard" />
    <meta property="og:description" content="Manage your Valcr Data API keys, monitor usage quotas, review request logs, and configure webhooks — all in one place." />
    <meta property="og:image"       content="https://console.valcr.site/og-console.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="Valcr Console — API developer dashboard" />
    <meta property="og:site_name"   content="Valcr Console" />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter / X Card ─────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@valcr_site" />
    <meta name="twitter:creator"     content="@glennorman_" />
    <meta name="twitter:title"       content="Valcr Console — Commerce Intelligence API Dashboard" />
    <meta name="twitter:description" content="Manage your Valcr Data API keys, monitor usage quotas, and configure webhooks." />
    <meta name="twitter:image"       content="https://console.valcr.site/og-console.png" />
    <meta name="twitter:image:alt"   content="Valcr Console" />

    <!-- ── Favicons ─────────────────────────────────────────────────────── -->
    <link rel="icon"             type="image/svg+xml"  href="/favicon.svg" />
    <link rel="icon"             type="image/x-icon"   href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180"        href="/apple-touch-icon.png" />
    <link rel="icon"             type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon"             type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest"                                href="/site.webmanifest" />
    <meta name="theme-color"     content="#080B10" />
    <meta name="msapplication-TileColor" content="#080B10" />

    <!-- ── Preconnect ───────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.valcr.site" />
    <link rel="preconnect" href="https://accounts.google.com" />

    <!-- ── Structured Data (JSON-LD) ────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Valcr Console",
      "url": "https://console.valcr.site",
      "description": "Developer console for managing Valcr Commerce Intelligence API keys, usage quotas, request logs, and webhooks.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "29",
        "priceCurrency": "USD",
        "description": "Developer tier — 10,000 API calls/month"
      },
      "provider": {
        "@type": "Organization",
        "name": "Valcr",
        "legalName": "Cyntax LLC",
        "url": "https://valcr.site",
        "email": "hello@valcr.site",
        "sameAs": [
          "https://twitter.com/valcr_site",
          "https://github.com/valcr"
        ]
      },
      "featureList": [
        "API key management",
        "Usage monitoring and quotas",
        "Request log viewer",
        "Webhook configuration",
        "Billing and invoices",
        "VCFS benchmark API access"
      ]
    }
    </script>

    <!-- ── Security headers via meta (belt-and-suspenders; real headers via server) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options"        content="DENY" />
    <meta http-equiv="Referrer-Policy"        content="strict-origin-when-cross-origin" />
    <!-- CSP is enforced server-side; this is a fallback -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self' https://api.valcr.site https://accounts.google.com https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https://api.valcr.site https://www.googleapis.com;" />

    <!-- ── Prevent indexing of authenticated pages post-login ────────────
         Google will see the login page (indexable). Once inside (hashed
         routes like #overview, #keys) the content is behind auth and the
         canonical URL doesn't change — so authenticated console content
         won't be indexed. This is the correct pattern for SPA consoles.  -->
  </head>
  <body>
    <noscript>
      <div style="
        min-height:100vh;background:#080B10;display:flex;
        align-items:center;justify-content:center;
        font-family:monospace;font-size:13px;color:#4A6480;
        text-align:center;padding:24px;
      ">
        <div>
          <p style="font-size:24px;font-weight:700;color:#E8F4FF;margin-bottom:8px;">Valcr Console</p>
          <p style="margin-bottom:16px;">JavaScript is required to use the Valcr Console.</p>
          <p>
            <a href="https://valcr.site" style="color:#4B9EFF;text-decoration:none;">← Back to valcr.site</a>
          </p>
        </div>
      </div>
    </noscript>

    <div id="root"></div>

    <!-- Main app bundle -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Google Identity Services (preloaded for OAuth) -->
    <script async defer src="https://accounts.google.com/gsi/client"></script>
  </body>
</html>
